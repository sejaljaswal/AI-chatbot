services:
  - type: web
    name: rag-chatbot-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port 10000 --proxy-headers --forwarded-allow-ips='*'
    envVars:
      - key: GOOGLE_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
